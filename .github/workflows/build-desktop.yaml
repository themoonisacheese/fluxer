# SPDX-License-Identifier: AGPL-3.0-or-later
name: build desktop

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel (stable or canary)
        required: false
        type: choice
        options: [stable, canary]
        default: stable
  push:
    tags: ['v*', 'canary-*']

permissions:
  contents: write

env:
  BUILD_CHANNEL: ${{ github.event.inputs.channel || (startsWith(github.ref, 'refs/tags/canary-') && 'canary' || 'stable') }}

jobs:
  build:
    name: Build ${{ matrix.platform }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            os: ubuntu-24.04
          - platform: windows
            arch: x64
            os: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        run: npm install -g pnpm@10

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libasound2-dev libdbus-1-dev libnotify-dev libxss-dev libxtst-dev libnss3-dev libsecret-1-dev librpm-dev
          sudo gem install fpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron main process
        working-directory: fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
          FLUXER_SKIP_NATIVE: 'true'
        run: node scripts/build.mjs

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        working-directory: fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
          FLUXER_SKIP_NATIVE: 'true'
          USE_SYSTEM_FPM: 'true'
        run: npx electron-builder --linux --${{ matrix.arch }} --config electron-builder.config.cjs

      - name: Build Electron app (Windows)
        if: matrix.platform == 'windows'
        working-directory: fluxer_desktop
        env:
          BUILD_CHANNEL: ${{ env.BUILD_CHANNEL }}
          FLUXER_SKIP_NATIVE: 'true'
        run: npx electron-builder --win --${{ matrix.arch }} --config electron-builder.config.cjs

      - name: Generate SHA256 checksums (Unix)
        if: matrix.platform != 'windows'
        working-directory: fluxer_desktop
        run: |
          cd dist-electron
          for f in *.AppImage *.deb *.rpm *.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done

      - name: Generate SHA256 checksums (Windows)
        if: matrix.platform == 'windows'
        working-directory: fluxer_desktop
        shell: pwsh
        run: |
          Get-ChildItem dist-electron -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: fluxer_desktop/dist-electron/*
          if-no-files-found: error
          retention-days: 14




  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="desktop-${BUILD_CHANNEL}-$(date -u +%Y.%-m%d.%H%M%S)"
          fi
          PRERELEASE_FLAG=""
          if [ "$BUILD_CHANNEL" = "canary" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Delete existing release so creation is always clean
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true

          # Only upload the packaged installer artifacts, skip loose internal files
          find artifacts -type f -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.exe' -o -name '*.sha256' -print0 | xargs -0 gh release create "$TAG" \
            --title "Fluxer Desktop ${BUILD_CHANNEL} $(date -u +%Y-%m-%d)" \
            --notes "Desktop client build for ${BUILD_CHANNEL} channel." \
            $PRERELEASE_FLAG
